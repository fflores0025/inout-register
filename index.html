<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut · Registro de Pulsera</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f;--surf:#0d0d1a;--card:#111120;--border:#1c1c2e;
      --a1:#c8ff00;--a2:#ff3cac;--a3:#00d4ff;
      --txt:#e6e6f0;--muted:#60607a;
      --success:#00e676;--danger:#ff1744;--warn:#ffab00;
      --r:16px;--r-sm:12px;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--txt);background:var(--bg);overflow:hidden;touch-action:manipulation;user-select:none;-webkit-font-smoothing:antialiased;}

    .kiosk{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:600px;margin:0 auto;padding:16px 20px;position:relative;}
    .kiosk::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(0,212,255,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

    .k-header{text-align:center;padding:8px 0;flex-shrink:0;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
    .k-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;flex:1;text-align:center;}
    .k-logo .hi{color:var(--a1);}
    .k-logo small{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:10px;color:var(--a3);text-transform:uppercase;letter-spacing:2.5px;margin-top:2px;}

    .k-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:8px 0 60px;position:relative;z-index:1;}

    .k-footer{text-align:center;padding:6px 0;flex-shrink:0;font-size:10px;color:var(--muted);position:relative;z-index:1;}

    /* Steps */
    .steps-bar{display:flex;gap:6px;margin-bottom:20px;width:100%;max-width:400px;}
    .step-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
    .step-dot.done{background:var(--a1);}
    .step-dot.active{background:var(--a3);animation:pulse-bar 1.5s ease-in-out infinite;}
    @keyframes pulse-bar{0%,100%{opacity:1;}50%{opacity:.5;}}

    /* QR scanner area */
    .scan-area{width:240px;height:240px;border-radius:20px;border:2px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto;overflow:hidden;}
    .scan-area.active{border-color:var(--a3);box-shadow:0 0 0 4px rgba(0,212,255,.1);}
    .scan-area.ok{border-color:var(--a1);box-shadow:0 0 0 4px rgba(200,255,0,.12);}
    .scan-area.err{border-color:var(--danger);box-shadow:0 0 0 4px rgba(255,23,68,.12);}
    .scan-corner{position:absolute;width:20px;height:20px;border-color:currentColor;border-style:solid;}
    .scan-corner.tl{top:8px;left:8px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
    .scan-corner.tr{top:8px;right:8px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
    .scan-corner.bl{bottom:8px;left:8px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
    .scan-corner.br{bottom:8px;right:8px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
    .scan-line{position:absolute;width:80%;height:2px;background:linear-gradient(to right,transparent,var(--a3),transparent);animation:scan 2s ease-in-out infinite;opacity:.8;}
    @keyframes scan{0%{top:20%;}100%{top:80%;}}

    /* NFC ring */
    .nfc-ring{width:160px;height:160px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;}
    .nfc-ring.scanning{border-color:var(--a3);color:var(--a3);animation:ring-pulse 2s ease-in-out infinite;}
    .nfc-ring.ok{border-color:var(--a1);color:var(--a1);}
    .nfc-ring.err{border-color:var(--danger);color:var(--danger);}
    .nfc-ring::before{content:'';position:absolute;width:192px;height:192px;border-radius:50%;border:1.5px solid currentColor;opacity:0;}
    .nfc-ring.scanning::before{animation:ring-expand 2s ease-in-out infinite;}
    @keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.25);}50%{box-shadow:0 0 0 16px rgba(0,212,255,0);}}
    @keyframes ring-expand{0%{opacity:.3;transform:scale(.85);}100%{opacity:0;transform:scale(1.1);}}
    .nfc-emoji{font-size:54px;line-height:1;display:block;text-align:center;}

    /* Cards */
    .info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;width:100%;margin-bottom:12px;}
    .info-card.success{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.05);}
    .info-card.danger{border-color:rgba(255,23,68,.3);background:rgba(255,23,68,.05);}
    .info-card.warn{border-color:rgba(255,171,0,.3);background:rgba(255,171,0,.05);}

    .ticket-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--a1);margin:4px 0;}
    .ticket-event{font-size:14px;color:var(--muted);margin-bottom:12px;}
    .ticket-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);}
    .ticket-row:last-child{border-bottom:none;}
    .ticket-lbl{color:var(--muted);}

    /* Buttons */
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;transition:opacity .12s,transform .1s;width:100%;min-height:52px;}
    .btn:active{transform:scale(.96);opacity:.8;}
    .btn:disabled{opacity:.4;pointer-events:none;}
    .btn-p{background:var(--a1);color:#000;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-danger{background:rgba(255,23,68,.1);color:var(--danger);border:1px solid rgba(255,23,68,.2);}

    .k-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;text-align:center;margin-top:14px;line-height:1.2;}
    .k-sub{color:var(--muted);font-size:14px;text-align:center;margin-top:6px;line-height:1.5;max-width:360px;}

    /* Input */
    .form-input{width:100%;padding:14px 16px;border-radius:var(--r-sm);background:var(--surf);border:2px solid var(--border);color:var(--txt);font-size:18px;font-family:monospace;text-align:center;letter-spacing:2px;outline:none;transition:border-color .15s;-webkit-text-fill-color:var(--txt);}
    .form-input:focus{border-color:var(--a3);}

    /* Success overlay */
    .success-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,40,10,.95);backdrop-filter:blur(6px);animation:fadeIn .25s ease;padding:24px;}
    .success-box{text-align:center;width:100%;max-width:380px;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    /* Status bar */
    .k-status{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:5px 16px 7px;font-size:10px;color:var(--muted);background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:10;pointer-events:none;}
    .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--a3);margin-right:5px;animation:blink 2s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* Toast */
    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:100px;padding:12px 22px;font-size:13px;z-index:1000;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;pointer-events:none;}
    #toast.show{transform:translateX(-50%) translateY(0);}
    #toast.err{border-color:rgba(255,23,68,.4);color:var(--danger);}
    #toast.ok{border-color:rgba(0,230,118,.4);color:var(--success);}
    #toast.warn{border-color:rgba(255,171,0,.4);color:var(--warn);}

    /* Event selector */
    .ev-btn{padding:14px 16px;background:var(--card);border:2px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all .15s;width:100%;text-align:left;margin-bottom:8px;}
    .ev-btn:hover,.ev-btn:active{border-color:var(--a3);background:rgba(0,212,255,.05);}
    .ev-btn.selected{border-color:var(--a1);background:rgba(200,255,0,.06);}
    .ev-nombre{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;}
    .ev-meta{font-size:12px;color:var(--muted);margin-top:3px;}

    @media(max-height:680px){
      .scan-area{width:180px;height:180px;}
      .nfc-ring{width:120px;height:120px;}
      .nfc-emoji{font-size:40px;}
      .k-title{font-size:18px;}
    }
  </style>
</head>
<body>
<div id="toast"></div>

<!-- PIN overlay -->
<div id="pin-overlay" style="display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:320px;text-align:center">
    <div style="font-family:Syne,sans-serif;font-size:18px;font-weight:700;margin-bottom:6px">Acceso de admin</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Introduce el PIN para continuar</div>
    <div style="display:flex;gap:12px;justify-content:center;margin:16px 0" id="pin-dots">
      <div id="pd0" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s"></div>
      <div id="pd1" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s"></div>
      <div id="pd2" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s"></div>
      <div id="pd3" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px" id="pin-pad">
      <div onclick="pinKey('1')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">1</div>
      <div onclick="pinKey('2')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">2</div>
      <div onclick="pinKey('3')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">3</div>
      <div onclick="pinKey('4')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">4</div>
      <div onclick="pinKey('5')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">5</div>
      <div onclick="pinKey('6')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">6</div>
      <div onclick="pinKey('7')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">7</div>
      <div onclick="pinKey('8')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">8</div>
      <div onclick="pinKey('9')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">9</div>
      <div style="padding:18px;opacity:.2">　</div>
      <div onclick="pinKey('0')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">0</div>
      <div onclick="pinKey('⌫')" style="padding:18px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:Syne,sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:background .1s">⌫</div>
    </div>
    <button onclick="closePIN()" style="margin-top:14px;width:100%;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px">Cancelar</button>
  </div>
</div>

<div class="kiosk">
  <div class="k-header">
    <div style="width:40px"></div>
    <div class="k-logo">in<span class="hi">out</span><small id="logo-sub">Registro · Enlace de pulsera</small></div>
    <div style="width:40px;display:flex;justify-content:flex-end">
      <div id="settings-btn" style="cursor:pointer;font-size:18px;color:var(--muted)" onclick="openSettings()" title="Configuración">⚙️</div>
    </div>
  </div>
  <div class="k-body" id="k-body"></div>
  <div class="k-footer" id="k-footer">InOut Media · Sistema de registro de pulseras</div>
</div>

<div class="k-status">
  <span><span class="dot"></span>InOut Register v1.0</span>
  <span id="k-time">—</span>
  <span id="k-nfc-status">NFC: —</span>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  MÓDULO PIN DE DISPOSITIVO — se inyecta en Staff/Register/Kiosk/Valid
//  PIN se pide UNA sola vez por sesión de app (hasta cerrar pestaña)
//  Se guarda en sessionStorage (se borra al cerrar) NO en localStorage
// ══════════════════════════════════════════════════════════════════
const DEVICE_PIN = '1234'; // ← cambiar en producción
const _DEVICE_PIN_KEY = 'inout_device_unlocked';

function isDeviceUnlocked(){
  return sessionStorage.getItem(_DEVICE_PIN_KEY) === 'yes';
}

function lockDevice(){
  sessionStorage.removeItem(_DEVICE_PIN_KEY);
}

// Muestra la pantalla de PIN bloqueando toda la UI hasta que sea correcto
// onUnlock: función a llamar cuando el PIN sea correcto
function showDeviceLockScreen(appName, appIcon, onUnlock){
  // Si ya está desbloqueado, ir directo
  if(isDeviceUnlocked()){ onUnlock(); return; }

  let _buf = '';
  const overlay = document.createElement('div');
  overlay.id = 'device-lock-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:var(--bg,#07070f);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;padding:24px;font-family:'DM Sans',sans-serif;
  `;
  overlay.innerHTML = `
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:52px;margin-bottom:10px">${appIcon}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#e6e6f0">
        InOut<span style="color:#c8ff00">.</span>
      </div>
      <div style="font-size:11px;color:#60607a;text-transform:uppercase;letter-spacing:2px;margin-top:3px">${appName}</div>
    </div>
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:#e6e6f0;margin-bottom:4px">PIN de dispositivo</div>
    <div style="font-size:13px;color:#60607a;margin-bottom:20px">Introduce el PIN para desbloquear</div>
    <div id="dl-dots" style="display:flex;gap:14px;justify-content:center;margin-bottom:24px">
      ${[0,1,2,3].map(i=>`<div id="dld${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid #1c1c2e;transition:all .15s"></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
        k===''
        ? '<div></div>'
        : `<div id="dlk-${k}" style="padding:18px;border-radius:14px;background:#0d0d1a;border:1px solid #1c1c2e;
               font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#e6e6f0;
               text-align:center;cursor:pointer;user-select:none;transition:background .1s" 
               onclick="dlKey('${k}')">${k}</div>`
      ).join('')}
    </div>
    <div id="dl-err" style="height:18px;margin-top:14px;font-size:13px;color:#ff1744;text-align:center"></div>
  `;
  document.body.appendChild(overlay);

  window.dlKey = function(k){
    if(k==='⌫'){ _buf=_buf.slice(0,-1); }
    else if(_buf.length<4){ _buf+=k; }
    // Actualizar dots
    for(let i=0;i<4;i++){
      const d=document.getElementById('dld'+i);
      if(d){ d.style.background=i<_buf.length?'#c8ff00':'transparent'; d.style.borderColor=i<_buf.length?'#c8ff00':'#1c1c2e'; }
    }
    if(_buf.length===4){
      setTimeout(()=>{
        if(_buf===DEVICE_PIN){
          sessionStorage.setItem(_DEVICE_PIN_KEY,'yes');
          overlay.style.transition='opacity .3s';
          overlay.style.opacity='0';
          setTimeout(()=>{ overlay.remove(); delete window.dlKey; onUnlock(); }, 300);
        } else {
          _buf='';
          for(let i=0;i<4;i++){const d=document.getElementById('dld'+i);if(d){d.style.background='transparent';d.style.borderColor='#ff1744';}}
          document.getElementById('dl-err').textContent='PIN incorrecto';
          // Shake
          overlay.style.transition='transform .08s';
          overlay.style.transform='translateX(10px)';
          setTimeout(()=>overlay.style.transform='translateX(-10px)',80);
          setTimeout(()=>overlay.style.transform='translateX(5px)',160);
          setTimeout(()=>{overlay.style.transform='translateX(0)';for(let i=0;i<4;i++){const d=document.getElementById('dld'+i);if(d)d.style.borderColor='#1c1c2e';}},240);
          setTimeout(()=>document.getElementById('dl-err').textContent='',2000);
        }
      },150);
    }
  };
}

// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const SB_URL   = 'https://raoxkjnwrccoxjcipfpv.supabase.co';
const SB_KEY   = 'sb_publishable__-K1pC4bOJHRf8JQ__OOzg_jqLxlGla';
const _sb      = supabase.createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════════════════
//  CONFIG PIN ADMIN
// ══════════════════════════════════════════════════
const ADMIN_PIN = '1234'; // ← cambiar en producción (mismo que kiosco)

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let activeEvent    = null;   // evento activo seleccionado
let nfcReader      = null;
let nfcSupported   = false;
let currentTicket  = null;   // ticket validado en paso 1
let idleTimer      = null;

// Persistir evento activo
const savedEventId = localStorage.getItem('reg_event_id');
const savedEventName = localStorage.getItem('reg_event_name');
if(savedEventId) activeEvent = {id: savedEventId, nombre: savedEventName};

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
let _toastTimer = null;
function toast(msg, type='', ms=3000){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

function resetIdle(){
  clearTimeout(idleTimer);
  const body = document.getElementById('k-body');
  if(!body || body.dataset.screen === 'idle') return;
  idleTimer = setTimeout(() => { showIdle(); }, 90_000); // 90s sin actividad
}

function startClock(){
  const tick = () => { const el=document.getElementById('k-time'); if(el) el.textContent=new Date().toLocaleTimeString('es-ES'); };
  tick(); setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════
//  PIN ADMIN
// ══════════════════════════════════════════════════
let _pinBuffer   = '';
let _pinCallback = null;

function openPIN(callback){
  _pinBuffer   = '';
  _pinCallback = callback;
  updatePINDots();
  const overlay = document.getElementById('pin-overlay');
  overlay.style.display = 'flex';
}

function closePIN(){
  _pinBuffer = '';
  document.getElementById('pin-overlay').style.display = 'none';
  updatePINDots();
}

function pinKey(k){
  if(k === '⌫'){ _pinBuffer = _pinBuffer.slice(0, -1); }
  else if(_pinBuffer.length < 4){ _pinBuffer += k; }
  updatePINDots();

  if(_pinBuffer.length === 4){
    setTimeout(() => {
      if(_pinBuffer === ADMIN_PIN){
        closePIN();
        if(_pinCallback) _pinCallback();
      } else {
        _pinBuffer = '';
        updatePINDots();
        // Shake visual
        const box = document.querySelector('#pin-overlay > div');
        if(box){
          box.style.transition = 'transform .1s';
          box.style.transform = 'translateX(8px)';
          setTimeout(() => { box.style.transform = 'translateX(-8px)'; }, 100);
          setTimeout(() => { box.style.transform = 'translateX(4px)'; },  200);
          setTimeout(() => { box.style.transform = 'translateX(0)'; },    300);
        }
        toast('PIN incorrecto', 'err');
      }
    }, 150);
  }
}

function updatePINDots(){
  for(let i = 0; i < 4; i++){
    const d = document.getElementById('pd'+i);
    if(!d) continue;
    if(i < _pinBuffer.length){
      d.style.background    = 'var(--a1)';
      d.style.borderColor   = 'var(--a1)';
    } else {
      d.style.background    = 'transparent';
      d.style.borderColor   = 'var(--border)';
    }
  }
}

// ══════════════════════════════════════════════════
async function initNFC(){
  const el = document.getElementById('k-nfc-status');
  // App Android bridge
  if(window.ANDROID_KIOSK){
    window.onAndroidNFCScan = (uid) => { if(uid && uid.length >= 4) onNFCScan(uid.toUpperCase()); };
    nfcSupported = window.ANDROID_NFC === true;
    if(el){ el.textContent = nfcSupported ? 'NFC: Activo (App)' : 'NFC: App sin NFC'; }
    return;
  }
  if(!('NDEFReader' in window)){
    if(el) el.textContent = 'NFC: No disponible';
    return;
  }
  nfcSupported = true;
  if(el){ el.textContent = 'NFC: Activo'; el.style.color = 'var(--a1)'; }
  try{
    nfcReader = new NDEFReader();
    await nfcReader.scan();
    nfcReader.onreading = ev => onNFCScan(ev.serialNumber.replace(/:/g,'').toUpperCase());
    nfcReader.onreadingerror = () => toast('Error leyendo NFC','err');
  }catch(e){
    nfcSupported = false;
    if(el) el.textContent = 'NFC: Sin permiso';
  }
}

async function validateTicket(code){
  // Limpiar el código — puede ser una URL con el ticket_id como parámetro
  // Formatos: 
  //   - Solo el código: "TK-XXXXX" 
  //   - URL: "https://inout-check.vercel.app/ticket/TK-XXXXX"
  //   - URL con param: "https://...?ticket=TK-XXXXX"
  let ticketCode = code;
  try{
    const url = new URL(code);
    // Intentar extraer de pathname o params
    const pathParts = url.pathname.split('/');
    const lastPart = pathParts[pathParts.length - 1];
    if(lastPart && lastPart.length > 4) ticketCode = lastPart;
    const param = url.searchParams.get('ticket') || url.searchParams.get('id') || url.searchParams.get('code');
    if(param) ticketCode = param;
  }catch(e){ /* no es URL, usar el código directo */ }

  try{
    // Buscar el ticket en Supabase
    // Los tickets tienen un campo 'ticket_code' o 'id' o un UUID
    let {data:ticket, error} = await _sb.from('tickets')
      .select('*, orders(buyer_name, buyer_email, buyer_phone), ticket_types(nombre, tipo_zona)')
      .or(`ticket_code.eq.${ticketCode},id.eq.${ticketCode}`)
      .eq('event_id', activeEvent.id)
      .maybeSingle();

    if(error) throw error;

    if(!ticket){
      // Intentar buscar por UUID completo si el código es un UUID
      const {data:ticket2} = await _sb.from('tickets')
        .select('*, orders(buyer_name, buyer_email, buyer_phone), ticket_types(nombre, tipo_zona)')
        .eq('id', ticketCode)
        .maybeSingle();
      ticket = ticket2;
    }
    
    if(!ticket){
      showTicketError(`Entrada no encontrada en ${activeEvent.nombre}`);
      return;
    }

    if(ticket.status === 'used' || ticket.validated){
      // Verificar si ya tiene pulsera asignada
      const {data:reg} = await _sb.from('event_wristband_registrations')
        .select('*, rfid_wristbands(uid,holder_name)')
        .eq('ticket_id', ticket.id)
        .maybeSingle();
      
      if(reg){
        showTicketAlreadyLinked(ticket, reg);
        return;
      }
    }

    currentTicket = ticket;
    showTicketValid(ticket);

  }catch(e){
    console.error(e);
    toast('Error al validar: '+e.message, 'err');
    const btn = document.querySelector('#k-body .btn-p');
    if(btn){ btn.disabled = false; btn.textContent = 'Validar entrada →'; }
  }
}

// ══════════════════════════════════════════════════
//  PROCESAR PULSERA — CORAZÓN DEL SISTEMA
// ══════════════════════════════════════════════════
async function processWristband(uid){
  const body = document.getElementById('k-body');
  body.innerHTML = `
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:48px;margin-bottom:12px">⏳</div>
      <div style="font-family:Syne;font-size:18px;font-weight:700;margin-bottom:8px">Procesando…</div>
      <div style="font-size:13px;color:var(--muted)">Registrando pulsera en el evento</div>
    </div>`;

  try{
    // 1. Buscar pulsera existente
    const {data:existing, error:searchErr} = await _sb.from('rfid_wristbands')
      .select('*')
      .eq('uid', uid)
      .maybeSingle();

    if(searchErr) throw searchErr;

    const buyer       = currentTicket?.orders || {};
    const holderName  = buyer.buyer_name  || existing?.holder_name  || 'Sin nombre';
    const holderEmail = buyer.buyer_email || existing?.holder_email || null;
    const holderPhone = buyer.buyer_phone || existing?.holder_phone || null;

    let wristband = existing;

    if(!wristband){
      // Pulsera nueva — crear con campos mínimos seguros
      const insertData = {
        uid,
        holder_name: holderName,
        status:      'active',
        balance:     0,
        event_id:    activeEvent.id,
      };
      // Añadir email/phone solo si existen (evitar error si la columna no existe)
      if(holderEmail) insertData.holder_email = holderEmail;
      if(holderPhone) insertData.holder_phone = holderPhone;

      const {data:newWb, error:wbErr} = await _sb
        .from('rfid_wristbands')
        .insert(insertData)
        .select()
        .single();

      if(wbErr) throw new Error('Error creando pulsera: ' + wbErr.message);
      wristband = newWb;

    } else {
      // Pulsera existente — actualizar event_id y nombre si tenemos datos mejores
      const updateData = {event_id: activeEvent.id};
      if(holderName !== 'Sin nombre' && wristband.holder_name !== holderName){
        updateData.holder_name = holderName;
      }
      const {error:updErr} = await _sb.from('rfid_wristbands').update(updateData).eq('id', wristband.id);
      if(updErr) console.warn('Update wristband:', updErr.message);
      else wristband.holder_name = holderName;
    }

    // 2. Registrar en event_wristband_registrations (tabla multi-evento)
    const {error:regErr} = await _sb.from('event_wristband_registrations').upsert({
      event_id:      activeEvent.id,
      wristband_id:  wristband.id,
      wristband_uid: uid,
      ticket_id:     currentTicket?.id || null,
      holder_name:   holderName,
      registered_at: new Date().toISOString(),
      registered_by: 'kiosk-register',
    }, {onConflict: 'event_id,wristband_uid'});

    if(regErr){
      // Tabla no existe aún — solo loguear, no bloquear
      console.warn('event_wristband_registrations error:', regErr.message);
      // El event_id ya está actualizado en rfid_wristbands arriba, así que funciona igualmente
    }

    // 3. Marcar ticket como usado (no crítico si falla)
    if(currentTicket?.id){
      const {error:tErr} = await _sb.from('tickets')
        .update({status:'used', validated:true, validated_at:new Date().toISOString()})
        .eq('id', currentTicket.id);
      if(tErr) console.warn('Update ticket:', tErr.message);
    }

    // 4. Log de transacción (completamente opcional — silenciar errores)
    try{
      await _sb.from('rfid_transactions').insert({
        wristband_id: wristband.id,
        event_id:     activeEvent.id,
        amount:       0,
        description:  'Registro entrada: ' + activeEvent.nombre,
        operator:     'kiosk-register',
      });
    }catch(_e){ console.warn('Log transaction (no crítico):', _e.message); }

    showSuccess(uid, wristband.holder_name || holderName, wristband);

  }catch(e){
    console.error('processWristband error:', e);
    showRegistrationError(uid, e.message || String(e));
  }
}

// ══════════════════════════════════════════════════
//  PANTALLA DE ÉXITO
// ══════════════════════════════════════════════════
function showSuccess(uid, holderName, wristband){
  if(navigator.vibrate) navigator.vibrate([100,60,100]);
  
  const overlay = document.createElement('div');
  overlay.className = 'success-overlay';
  overlay.innerHTML = `
    <div class="success-box">
      <div style="font-size:72px;margin-bottom:12px">✅</div>
      <div style="font-family:Syne;font-size:26px;font-weight:800;color:var(--success);margin-bottom:6px">¡Registrado!</div>
      <div style="font-size:16px;color:var(--a1);font-family:Syne;font-weight:700;margin-bottom:16px">${holderName}</div>
      <div style="background:rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left">
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:var(--muted)">Pulsera</span><span style="font-family:monospace;font-size:12px">${uid}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:var(--muted)">Evento</span><span>${activeEvent?.nombre}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:var(--muted)">Saldo</span><span style="color:var(--a1);font-weight:600">${(wristband.balance||0).toFixed(2)} €</span></div>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px" id="scd">Volviendo al inicio en 4 seg…</div>
      <button class="btn btn-p" onclick="this.closest('.success-overlay').remove();showIdle()">
        Siguiente persona →
      </button>
    </div>`;
  document.body.appendChild(overlay);
  
  let secs = 4;
  const ticker = setInterval(() => {
    secs--;
    const el = document.getElementById('scd');
    if(el) el.textContent = `Volviendo al inicio en ${secs} seg…`;
    if(secs <= 0){ clearInterval(ticker); overlay.remove(); showIdle(); }
  }, 1000);
}

function showRegistrationError(uid, errMsg){
  const body = document.getElementById('k-body');
  body.innerHTML = `
    <div style="width:100%;max-width:400px;text-align:center">
      <div style="font-size:64px;margin-bottom:12px">❌</div>
      <div style="font-family:Syne;font-size:20px;font-weight:700;color:var(--danger);margin-bottom:8px">Error al registrar</div>
      <div class="info-card danger" style="text-align:left">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">UID:</div>
        <div style="font-family:monospace;font-size:14px;margin-bottom:8px">${uid}</div>
        <div style="font-size:12px;color:var(--muted)">${errMsg}</div>
      </div>
      <button class="btn btn-p" style="margin-top:16px" onclick="startStep2()">🔄 Reintentar</button>
      <button class="btn btn-g" style="margin-top:8px" onclick="showIdle()">← Inicio</button>
    </div>`;
}

// ══════════════════════════════════════════════════
//  MODO DIRECTO — Solo registrar pulsera sin QR
//  (para discotecas donde no hay ticket previo)
// ══════════════════════════════════════════════════
function skipToWristband(){
  if(!activeEvent){ toast('Selecciona un evento primero','warn'); openSettings(); return; }
  // Pedir PIN de admin antes de permitir el registro sin QR
  openPIN(() => {
    currentTicket = null;
  
  const body = document.getElementById('k-body');
  body.dataset.screen = 'direct';
  resetIdle();
  
  body.innerHTML = `
    <div style="width:100%;max-width:400px;text-align:center">
      <div style="font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">REGISTRO DIRECTO</div>
      
      <div class="nfc-ring scanning" id="nfc-ring-d">
        <span class="nfc-emoji">📡</span>
      </div>
      
      <div class="k-title">Acerca tu pulsera</div>
      <div class="k-sub">La pulsera se enlazará directamente al evento <strong style="color:var(--a1)">${activeEvent.nombre}</strong></div>
      
      ${!nfcSupported ? `
        <div style="margin-top:16px">
          <input id="uid-direct" class="form-input" type="text" 
            placeholder="UID de la pulsera"
            oninput="this.value=this.value.replace(/[^a-fA-F0-9]/g,'').toUpperCase()"
            onkeydown="if(event.key==='Enter')submitDirectUID()"/>
          <button class="btn btn-p" style="margin-top:10px" onclick="submitDirectUID()">Registrar</button>
        </div>
      ` : ''}
      
      <button class="btn btn-g" style="margin-top:14px;font-size:13px" onclick="showIdle()">← Cancelar</button>
    </div>`;
  
  // Cambiar handler NFC a modo directo
  body.dataset.nfcMode = 'direct';
  if(!nfcSupported) setTimeout(() => document.getElementById('uid-direct')?.focus(), 100);
  }); // fin openPIN callback
}

// Override onNFCScan para modo directo
const _originalOnNFCScan = onNFCScan;
window.onNFCScan = async function(uid){
  const body = document.getElementById('k-body');
  if(body.dataset.screen === 'direct' || body.dataset.screen === 'step2'){
    if(navigator.vibrate) navigator.vibrate(100);
    const ring = document.getElementById('nfc-ring') || document.getElementById('nfc-ring-d');
    if(ring) ring.className = 'nfc-ring ok';
    await processWristband(uid);
  }
};
// Reasignar el handler de NFC reader
if(nfcReader) nfcReader.onreading = ev => window.onNFCScan(ev.serialNumber.replace(/:/g,'').toUpperCase());
if(window.ANDROID_KIOSK) window.onAndroidNFCScan = uid => { if(uid && uid.length >= 4) window.onNFCScan(uid.toUpperCase()); };

async function submitDirectUID(){
  const uid = document.getElementById('uid-direct')?.value?.trim().toUpperCase();
  if(!uid || uid.length < 4){ toast('UID inválido','warn'); return; }
  await processWristband(uid);
}

// ══════════════════════════════════════════════════
//  SQL MIGRATION HELPER — crea tabla si no existe
// ══════════════════════════════════════════════════
async function ensureRegistrationsTable(){
  // Intentar hacer un select para ver si la tabla existe
  const {error} = await _sb.from('event_wristband_registrations').select('id').limit(1);
  if(error && error.code === '42P01'){
    console.warn('La tabla event_wristband_registrations no existe. Ejecuta el SQL del README.');
    toast('⚠️ Falta tabla en BD. Ver consola.','warn',6000);
  }
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
(async function init(){
  // ── MULTI-TENANT: cargar organización por slug ──
  const slug = location.pathname.replace(/^\//, '').split('/')[0]
  if (!slug) {
    document.body.innerHTML = '<div style="color:#e6e6f0;text-align:center;padding:4rem;font-family:Syne,sans-serif;font-size:1.2rem">Acceso no válido — falta el slug de organización</div>'
    return
  }
  const { data: org } = await _sb.from('organizations').select('*').eq('slug', slug).maybeSingle()
  if (!org) {
    document.body.innerHTML = `<div style="color:#e6e6f0;text-align:center;padding:4rem;font-family:Syne,sans-serif;font-size:1.2rem">Organización "${slug}" no encontrada</div>`
    return
  }
  if (org.color_primario) document.documentElement.style.setProperty('--a1', org.color_primario)
  if (org.color_secundario) document.documentElement.style.setProperty('--a2', org.color_secundario)
  document.querySelector('.k-logo').innerHTML = `<img src="${org.logo_url||''}" style="height:28px;object-fit:contain" onerror="this.style.display='none'"> <span style="margin-left:6px">in<span class="hi">out</span></span><small id="logo-sub">Registro · ${org.nombre}</small>`
  localStorage.setItem('inout_org_id', org.id)
  localStorage.setItem('inout_org_slug', org.slug)
  localStorage.setItem('inout_org_name', org.nombre)

// Limpiar evento activo si no corresponde a esta org
const savedEvOrgSlug = localStorage.getItem('reg_event_slug')
if (savedEvOrgSlug !== org.slug) {
  localStorage.removeItem('reg_event_id')
  localStorage.removeItem('reg_event_name')
  localStorage.setItem('reg_event_slug', org.slug)
  activeEvent = null
}
  // ── FIN MULTI-TENANT ──

  showDeviceLockScreen('Registro de Pulseras','📝', async()=>{
    startClock();
    await initNFC();
    await ensureRegistrationsTable();
    document.addEventListener('touchstart', resetIdle, {passive:true});
    document.addEventListener('click', resetIdle);
    showIdle();
  });
})();
</script>
</body>
